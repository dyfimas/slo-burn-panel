<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="Inter, -apple-system, BlinkMacSystemFont, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111217"/>
      <stop offset="100%" stop-color="#181b1f"/>
    </linearGradient>
    <linearGradient id="gaugeGreen" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37872d"/>
      <stop offset="100%" stop-color="#73bf69"/>
    </linearGradient>
    <linearGradient id="barGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#37872d"/>
      <stop offset="65%" stop-color="#fade2a"/>
      <stop offset="100%" stop-color="#f2495c"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="800" height="500" rx="8" fill="url(#bg)"/>
  <rect x="0" y="0" width="800" height="40" rx="8" fill="#1e2028"/>
  <rect x="0" y="32" width="800" height="8" fill="#1e2028"/>

  <!-- Header bar -->
  <text x="16" y="27" fill="#ccccdc" font-size="14" font-weight="600">SLO Burn Rate</text>
  <rect x="130" y="14" width="52" height="20" rx="4" fill="#37872d"/>
  <text x="156" y="28" fill="#fff" font-size="10" font-weight="600" text-anchor="middle">SAFE</text>

  <!-- SLO Info row -->
  <text x="16" y="62" fill="#8e8ea0" font-size="11">SLO Target</text>
  <text x="16" y="78" fill="#73bf69" font-size="16" font-weight="700">99.9%</text>
  <text x="120" y="62" fill="#8e8ea0" font-size="11">Window</text>
  <text x="120" y="78" fill="#ccccdc" font-size="16" font-weight="700">30d</text>
  <text x="200" y="62" fill="#8e8ea0" font-size="11">Error Budget</text>
  <text x="200" y="78" fill="#ccccdc" font-size="16" font-weight="700">0.100%</text>

  <!-- Gauge arc (semicircle) -->
  <g transform="translate(200, 210)">
    <!-- Background arc -->
    <path d="M -120 0 A 120 120 0 0 1 120 0" fill="none" stroke="#2c3035" stroke-width="18" stroke-linecap="round"/>
    <!-- Value arc (~72% budget remaining) -->
    <path d="M -120 0 A 120 120 0 0 1 84 -85" fill="none" stroke="url(#gaugeGreen)" stroke-width="18" stroke-linecap="round"/>
    <!-- Center text -->
    <text x="0" y="-20" fill="#ccccdc" font-size="11" text-anchor="middle">Budget Remaining</text>
    <text x="0" y="10" fill="#73bf69" font-size="32" font-weight="700" text-anchor="middle">72.3%</text>
    <text x="0" y="30" fill="#8e8ea0" font-size="11" text-anchor="middle">27.7% consumed</text>
    <!-- Labels -->
    <text x="-130" y="16" fill="#8e8ea0" font-size="10" text-anchor="middle">0%</text>
    <text x="130" y="16" fill="#8e8ea0" font-size="10" text-anchor="middle">100%</text>
  </g>

  <!-- Sparkline section -->
  <g transform="translate(400, 55)">
    <text x="0" y="12" fill="#ccccdc" font-size="12" font-weight="600">Burn Rate Timeline</text>
    <!-- Sparkline grid -->
    <rect x="0" y="25" width="370" height="100" rx="4" fill="#1e2028"/>
    <!-- 1x threshold line -->
    <line x1="0" y1="95" x2="370" y2="95" stroke="#f2495c" stroke-width="1" stroke-dasharray="4,3" opacity="0.6"/>
    <text x="374" y="98" fill="#f2495c" font-size="9" opacity="0.7">1x</text>
    <!-- Sparkline path (burn rate ~0.3-0.8x, with spike around 60-70%) -->
    <polyline fill="none" stroke="#73bf69" stroke-width="2"
      points="5,90 15,88 25,91 35,89 45,87 55,90 65,85 75,88 85,86 95,84 105,87 115,83 125,80 135,85 145,82 155,79 165,84 175,81 180,60 185,45 190,38 195,42 200,55 205,65 210,72 215,78 220,82 225,85 230,84 240,87 250,85 260,88 270,86 280,89 290,87 300,85 310,88 320,86 330,89 340,87 350,90 360,88 370,87"/>
    <!-- Spike points in red -->
    <circle cx="185" cy="45" r="3" fill="#f2495c"/>
    <circle cx="190" cy="38" r="3" fill="#f2495c"/>
    <circle cx="195" cy="42" r="3" fill="#f2495c"/>
  </g>

  <!-- Budget consumption bar -->
  <g transform="translate(400, 185)">
    <text x="0" y="12" fill="#ccccdc" font-size="12" font-weight="600">Budget Consumption</text>
    <rect x="0" y="22" width="370" height="16" rx="4" fill="#2c3035"/>
    <rect x="0" y="22" width="102" height="16" rx="4" fill="url(#barGrad)"/>
    <text x="110" y="34" fill="#ccccdc" font-size="11" font-weight="600">27.7%</text>
  </g>

  <!-- Stats grid -->
  <g transform="translate(16, 260)">
    <text x="0" y="0" fill="#ccccdc" font-size="12" font-weight="600">Statistics</text>
    <!-- Row 1 -->
    <rect x="0" y="12" width="248" height="56" rx="4" fill="#1e2028"/>
    <rect x="258" y="12" width="248" height="56" rx="4" fill="#1e2028"/>
    <rect x="516" y="12" width="248" height="56" rx="4" fill="#1e2028"/>

    <text x="12" y="34" fill="#8e8ea0" font-size="10">Short Burn Rate</text>
    <text x="12" y="56" fill="#73bf69" font-size="20" font-weight="700">0.42x</text>

    <text x="270" y="34" fill="#8e8ea0" font-size="10">Long Burn Rate</text>
    <text x="270" y="56" fill="#73bf69" font-size="20" font-weight="700">0.38x</text>

    <text x="528" y="34" fill="#8e8ea0" font-size="10">Overall Burn Rate</text>
    <text x="528" y="56" fill="#ccccdc" font-size="20" font-weight="700">0.28x</text>

    <!-- Row 2 -->
    <rect x="0" y="78" width="248" height="56" rx="4" fill="#1e2028"/>
    <rect x="258" y="78" width="248" height="56" rx="4" fill="#1e2028"/>
    <rect x="516" y="78" width="248" height="56" rx="4" fill="#1e2028"/>

    <text x="12" y="100" fill="#8e8ea0" font-size="10">Current Error Rate</text>
    <text x="12" y="122" fill="#ccccdc" font-size="20" font-weight="700">0.028%</text>

    <text x="270" y="100" fill="#8e8ea0" font-size="10">Time to Exhaustion</text>
    <text x="270" y="122" fill="#73bf69" font-size="20" font-weight="700">78.2d</text>

    <text x="528" y="100" fill="#8e8ea0" font-size="10">Data Points</text>
    <text x="528" y="122" fill="#ccccdc" font-size="20" font-weight="700">288</text>
  </g>

  <!-- Grafana-style bottom border -->
  <rect x="0" y="496" width="800" height="4" rx="0" fill="#37872d"/>
</svg>
